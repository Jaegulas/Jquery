<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script type="text/javascript">
 		//배열
 		const arr1 = ["apple", "banana", "orange"];
 		//				0          1          2       index
 		const arr2 = ["grape",  "lemon",  "peach"];
 		//				0          1          2       index
	
		//1. 배열 병합
		const mergedArr = $.merge(arr1, arr2);
 		
 		//2. 배열 요소 검색 
 		//방법 : 	 $.inArray("전체배열에서 찾을요소", 전체배열)
		 		
 		//mergeArr 전체 배열에서 "lemon" 문자열이 배열에 저장되어 있는지 찾는데..
 		const index = $.inArray("lemon" ,mergedArr);
		//		4
		
 		//3. 배열에 찾을 요소가 있는지 체크
 		if(index > -1){
 			console.log("lemon is at index " + index);	// 4
 		}
		
		/*
			const mergedArr = ["apple", "banana", "orange", "grape", "lemon", "peach"]
									0		1		2			3		4		5		index
		*/
		//4. 배열 요소 필터링
		//방법 : $.grep(전체배열, function(elem){ return 조건식;});
		
		//해야할일 : mergedArr 배열에 저장된 문자열들을 각각 검사해서 a 문자가 포함된 문자열들만 
		//			새 배열에 보관후 새 배열을 얻자.
		const filteredArr = $.grep(mergedArr, function(elem){	
													//"apple"
													//"banana"
									//elem매개변수로 전달 받은 문자열에서 'a'문자가 포함되어 있느냐?
							return 	  elem.indexOf('a') > -1;
							return "grape".indexof('a') > -1;
							return			true;
						 // return "apple".indexOf('a') -> index 위치 번호 0 반환
						 //	        01234
						 //	return 			true;
						 
						 //새배열
						 //["apple", "banana", "orange", "grape", "peach" ]
						 
						});
			
		console.log( JSON.stringify( filteredArr) );
		
		//5. filteredArr 원본배열에 저장된 문자열들을 가공(대문자로 변경)해서 새 배열에 담아 새 배열을 얻자
		const resultArr = $.map(filteredArr, function(elem){
			
						   return elem.toUpperCase(); 
					//	   return "apple".toUpperCase();	=대문자로 변환후 제공==> "APPLE"
					//	   return "APPLE";
					
					//새 배열 -> ["APPLE", "BANANA", "ORANGE", "GRAPE", "PEACH"]
		});
		
		console.log( JSON.stringify(resultArr) );
 			
 		
  </script>
 
</head>
<body>

</body>
</html>
